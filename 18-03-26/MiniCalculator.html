<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      display: grid;
      gap: 10px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 250px;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      font-weight: bold;
      text-align: center;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h1 style="text-align: center; color: #0056b3"><em>Mini-Calculator</em></h1>
    <input type="number" id="num1" placeholder="Enter first number" />
    
    <select id="operator">
      <option value="+">+</option>
      <option value="-">−</option>
      <option value="*">×</option>
      <option value="/">÷</option>
      <option value="%">%</option>
      <option value="**">Power (**)</option>
    </select>

    <input type="number" id="num2" placeholder="Enter second number" />

    <button onclick="calculate()">=</button>

    <div class="result" id="result">Result: </div>
  </div>

  <script>
    function calculate() {
      const num1 = parseFloat(document.getElementById("num1").value);
      const num2 = parseFloat(document.getElementById("num2").value);
      const operator = document.getElementById("operator").value;
      const resultElement = document.getElementById("result");

      if (isNaN(num1) || isNaN(num2)) {
        resultElement.textContent = "Result: Enter valid numbers";
        return;
      }

      let result;

      switch (operator) {
        case "+": result = num1 + num2; break;
        case "-": result = num1 - num2; break;
        case "*": result = num1 * num2; break;
        case "/":
          result = num2 !== 0 ? num1 / num2 : "Cannot divide by 0";
          break;
        case "%": result = num1 % num2; break;
        case "**": result = num1 ** num2; break;
        default:
          result = "Invalid operation";
      }

      resultElement.textContent = `Result: ${result}`;
    }
  </script>

</body>
</html>
