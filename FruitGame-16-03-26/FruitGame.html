<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Fruit Fall</title>
<link rel="stylesheet" href="./FruitGame.css">
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="title">Fruit Fall 🍎</div>
    <div class="stats">
      <div class="stat"><span class="icon">⭐</span> Score: <b id="score">0</b></div>
      <div class="stat"><span class="icon">❤️</span> Lives: <b id="lives">5</b></div>
      <div class="stat"><span class="icon">🔥</span> Combo: <b id="combo">0</b></div>
      <div class="stat"><span class="icon">⏱</span> Time: <b id="time">--</b></div>
      <div class="stat"><span class="icon">🏆</span> High: <b id="high">0</b></div>
      <div class="stat"> Mode
        <select id="mode">
          <option value="infinite">Infinite</option>
          <option value="timer">Timer</option>
        </select>
      </div>
      <div class="stat"> Difficulty
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
    </div>
  </div>
  <div id="game">
    <div class="basket">🧺</div>
    <div id="comboText" class="comboText"></div>
  </div>
</div>

<!-- Modal -->
<div id="gameOverModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
  <div class="modal-content">
    <h2 id="modalTitle">Game Over</h2>
    <p id="modalDesc">Your Score: <span id="finalScore">0</span></p>
    <button id="tryAgainBtn" type="button">Try Again</button>
  </div>
</div>
<script src="./FruitGame.js"></script>
</body>
</html>
