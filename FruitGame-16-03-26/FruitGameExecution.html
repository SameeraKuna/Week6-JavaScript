<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Fruit Fall</title>
<style>
    * { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter,Segoe UI,Arial;
  background: #071c36;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* container */
.container { width: 1100px; }

/* glass topbar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  background: rgba(15,35,70,.6);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.08);
  margin-bottom: 14px;
}

/* title */
.title {
  font-weight: 700;
  font-size: 22px;
  color: #ffd166;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* stats */
.stats {
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 30px;
  background: linear-gradient(145deg,#132f55,#0b2242);
  box-shadow: 0 4px 12px rgba(0,0,0,.4), inset 0 1px 1px rgba(255,255,255,.08);
  font-size: 14px;
}
.icon { font-size: 15px; opacity: .9; }
select { background: transparent; border: none; color: white; font-size: 14px; outline: none; }

/* game area */
#game {
  height: 520px;
  background: linear-gradient(#2a0037,#4c0050);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
}
.basket {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 50px;
  pointer-events: none;
}
.fruit {
  position: absolute;
  font-size: 34px;
  transition: transform .2s;
}
.slice {
  animation: slice .35s forwards;
}
@keyframes slice {
  0% { transform: scale(1) }
  50% { transform: scale(1.3) rotate(15deg) }
  100% { transform: scale(0) rotate(45deg); opacity: 0 }
}

/* combo text */
.comboText {
  position: absolute;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  opacity: 0;
  font-weight: 700;
  color: #ffd166;
  text-shadow: 0 0 10px #ffd166, 0 0 20px #ff9f1c;
  transition: .3s;
}
.comboGlow { animation: comboGlow .5s; }
@keyframes comboGlow { 0%{text-shadow:0 0 5px #fff} 50%{text-shadow:0 0 25px #ffd166} 100%{text-shadow:0 0 5px #fff} }

/* particles */
.particle {
  position: absolute;
  font-size: 16px;
  animation: explode .5s forwards;
}
@keyframes explode { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(2) translateY(-20px)} }

/* bomb explosion */
.explosion { position: absolute; font-size: 70px; animation: bombExplode .6s forwards; }
@keyframes bombExplode { 0%{transform:scale(.5)} 50%{transform:scale(1.6)} 100%{transform:scale(2);opacity:0} }

/* screen shake */
.shake { animation: shake .3s; }
@keyframes shake { 0%{transform:translate(0)} 25%{transform:translate(-6px)} 50%{transform:translate(6px)} 75%{transform:translate(-4px)} 100%{transform:translate(0)} }

/* modal overlay */
.modal {
  position: fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background: rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition: opacity .3s ease;
  z-index: 1000;
}
.modal.active { opacity:1; pointer-events:auto; }

/* modal content */
.modal-content {
  background: rgba(20,40,80,0.85);
  backdrop-filter: blur(12px);
  padding: 40px 30px;
  border-radius: 16px;
  text-align: center;
  width: 320px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 20px #ffd166cc;
  color: #ffd166;
}
.modal-content h2 { margin:0 0 12px; font-size: 32px; }
.modal-content p { font-size: 20px; margin: 0 0 24px; color: #fff; }
.modal-content button {
  background: #ffd166;
  border: none;
  border-radius: 30px;
  padding: 12px 24px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  color: #000;
  transition: background .3s ease;
}
.modal-content button:hover { background: #ffba33; }

</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="title">Fruit Fall 🍎</div>
    <div class="stats">
      <div class="stat"><span class="icon">⭐</span> Score: <b id="score">0</b></div>
      <div class="stat"><span class="icon">❤️</span> Lives: <b id="lives">5</b></div>
      <div class="stat"><span class="icon">🔥</span> Combo: <b id="combo">0</b></div>
      <div class="stat"><span class="icon">⏱</span> Time: <b id="time">--</b></div>
      <div class="stat"><span class="icon">🏆</span> High: <b id="high">0</b></div>
      <div class="stat"> Mode
        <select id="mode">
          <option value="infinite">Infinite</option>
          <option value="timer">Timer</option>
        </select>
      </div>
      <div class="stat"> Difficulty
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
    </div>
  </div>
  <div id="game">
    <div class="basket">🧺</div>
    <div id="comboText" class="comboText"></div>
  </div>
</div>

<!-- Modal -->
<div id="gameOverModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
    <!-- accesibility attributes(SEO,Screen readers):
        1.role:dialog->element is a dialog box
        2.aria-model="true"->modal is open and interaction outside modal is blocked until modal is closed
        3.aria-labelledby="modalTitle"->associates the dialog with id="modalTitle" i.e, title of modal, screen reader reads- Game Over
        4.aria-describedby="modalDesc"->assoicates the dialog with id="modalDesc" i.e, enables screen readers to read the description-->
  <div class="modal-content">
    <h2 id="modalTitle">Game Over</h2>
    <p id="modalDesc">Your Score: <span id="finalScore">0</span></p>
    <button id="tryAgainBtn" type="button">Try Again</button>
  </div>
</div>
<script>
    /* DOM Elements */
/* const signals that a variable will always refer to the same DOM element.”
const only protects the variable reference. We can modify the object’s internal properties like DOM element’s style, textContent, children, etc.
Hence we used const for DOM elements as we don't want to reassign them and const is safer and semantically clearer*/

const game = document.getElementById("game");
const basket = game.querySelector(".basket");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const comboEl = document.getElementById("combo");
const timeEl = document.getElementById("time");
const comboText = document.getElementById("comboText");
const highEl = document.getElementById("high");
const modeSelect = document.getElementById("mode");
const difficultySelect = document.getElementById("difficulty");
const modal = document.getElementById("gameOverModal");
const finalScore = document.getElementById("finalScore");
const tryAgainBtn = document.getElementById("tryAgainBtn");

/* Game State */
let score = 0, lives = 5, combo = 0, multiplier = 1;
/*score → Keeps track of the player’s points. Initially 0.
lives → Number of “chances” the player has. Starts at 5.
combo → Counts consecutive successful fruit catches without missing. Starts at 0.
multiplier → The score multiplier based on combo streaks. Starts at 1.
💡 These variables change during the game, so let is used*/
let fruitRate = 800, baseSpeed = 2;
/*fruitRate → How often a new fruit appears, in milliseconds. 800 means every 0.8 seconds.
baseSpeed → The starting speed at which fruits fall. 2 is in pixels per frame.
These may change based on difficulty, hence let is used.*/
let timer = null, timeLeft = 60;
/* timer → Holds the reference to the interval for the game timer (used with setInterval). Initially null because the timer hasn’t started yet.
timeLeft → Countdown timer for “timed mode”. Starts at 60 seconds.*/
let highScore = parseInt(localStorage.getItem("fruitHigh") || 0);
/* localStorage.getItem("fruitHigh") → Tries to fetch the saved high score from the browser’s storage.
|| 0 → If there’s nothing saved, default to 0.
parseInt(...) → Converts the stored string into a number.
This gives the player a persistent high score even after closing the browser.*/
highEl.textContent = highScore;
/*highEl → The DOM element that shows the high score on the screen.
.textContent = highScore → Updates the element’s visible text to the stored high score.
This is what displays the high score when the page loads.*/
const fruits = ["🍎","🍊","🍌","🍓","🍇","🍑","🍍"];
const bomb = "💣";

/****************To Animate numeric values(Score Elemnet)->function will change el.textContent gradually from start to end. */
/*animateValue smoothly updates a number from start to end over duration milliseconds using requestAnimationFrame.
It calculates progress based on time rather than frames, which makes it consistent across different devices.
Perfect for animating scores, timers, or counters in games.*/
function animateValue(el, start, end, duration)
/*el → The DOM element whose text you want to animate (e.g., score element).
start → The number to start from.
end → The number to end at.
duration → How long (in milliseconds) the animation should take.*/
{
  let startTime = null;
  /* Initializes a variable startTime to keep track of when the animation starts.
->null means it hasn’t started yet.
We need this to calculate progress over time.*/
  function step(timestamp){
    if(!startTime) startTime = timestamp;
    const progress = Math.min((timestamp-startTime)/duration,1);
    el.textContent = Math.floor(progress*(end-start)+start);
    if(progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* Apply Difficulty */
function applyDifficulty(){
  const difficulty = difficultySelect.value;
  const config = { easy:[1000,2], medium:[800,3], hard:[600,4] };
  [fruitRate, baseSpeed] = config[difficulty];
}
difficultySelect.addEventListener("change", applyDifficulty);
applyDifficulty();

/* Mode Control */
modeSelect.addEventListener("change", ()=> {
  if(modeSelect.value === "timer") startTimer();
  else { clearInterval(timer); timeEl.textContent = "--"; }
});

/* Timer */
function startTimer(){
  clearInterval(timer);
  timeLeft = 60;
  timeEl.textContent = timeLeft;
  timer = setInterval(()=>{
    timeLeft--;
    timeEl.textContent = timeLeft;
    if(timeLeft <= 0) endGame();
  }, 1000);
}

/* Basket Control */
game.addEventListener("mousemove", e => {
  const rect = game.getBoundingClientRect();
  basket.style.left = (e.clientX - rect.left) + "px";
});

/* Spawn Fruit */
function spawnFruit(){
  const fruit = document.createElement("div");
  fruit.className = "fruit";
  const type = Math.random() < 0.12 ? "bomb" : "fruit";
  fruit.textContent = type === "bomb" ? bomb : fruits[Math.floor(Math.random()*fruits.length)];
  fruit.dataset.type = type;
  fruit.style.left = Math.random()*(game.clientWidth-40) + "px";
  fruit.style.top = "-40px";
  game.appendChild(fruit);

  const speed = baseSpeed + Math.random()*2;
  function fall(){
    const top = parseFloat(fruit.style.top) + speed;
    fruit.style.top = top + "px";
    checkCollision(fruit);
    if(top <= game.clientHeight) requestAnimationFrame(fall);
    else { if(type==="fruit"){ combo=0; multiplier=1; comboEl.textContent=combo } fruit.remove(); }
  }
  requestAnimationFrame(fall);
}

/* Collision Detection */
function checkCollision(fruit){
  const r1 = fruit.getBoundingClientRect(), r2 = basket.getBoundingClientRect();
  if(r1.bottom >= r2.top && r1.left < r2.right && r1.right > r2.left){
    if(fruit.dataset.type === "bomb"){
      explodeBomb(fruit);
      lives--; livesEl.textContent = lives;
      combo = 0; multiplier = 1; comboEl.textContent = combo;
    } else {
      combo++;
      multiplier = combo>=10 ? 3 : combo>=5 ? 2 : 1;
      const oldScore = score;
      score += multiplier;
      animateValue(scoreEl, oldScore, score, 200);
      comboEl.textContent = combo;
      showCombo();
      sliceAnimation(fruit);
      spawnParticles(fruit);
    }
    fruit.remove();
    if(lives <= 0) endGame();
  }
}

/* Combo Text */
function showCombo(){
  comboText.textContent = "COMBO x" + combo;
  comboText.style.opacity = 1;
  comboText.classList.add("comboGlow");
  setTimeout(()=>{
    comboText.style.opacity = 0;
    comboText.classList.remove("comboGlow");
  },500);
}

/* Slice Animation */
function sliceAnimation(fruit){ fruit.classList.add("slice"); }

/* Particles */
function spawnParticles(fruit){
  const left = fruit.style.left, top = fruit.style.top;
  for(let i=0;i<6;i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.textContent = "✨";
    p.style.left = left; p.style.top = top;
    game.appendChild(p);
    setTimeout(()=>p.remove(),500);
  }
}

/* Bomb Explosion */
function explodeBomb(fruit){
  const boom = document.createElement("div");
  boom.className = "explosion";
  boom.textContent = "💥";
  boom.style.left = fruit.style.left; boom.style.top = fruit.style.top;
  game.appendChild(boom);
  game.classList.add("shake");
  setTimeout(()=>{
    boom.remove();
    game.classList.remove("shake");
  },500);
}

/* End Game */
function endGame(){
  clearInterval(timer);
  if(score > highScore) localStorage.setItem("fruitHigh", score);
  finalScore.textContent = score;
  modal.classList.add("active");
}

/* Restart */
tryAgainBtn.addEventListener("click", () => {
  score = 0; lives = 5; combo = 0; multiplier = 1;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  comboEl.textContent = combo;
  timeEl.textContent = modeSelect.value === "timer" ? 60 : "--";
  modal.classList.remove("active");
  applyDifficulty();
  if(modeSelect.value === "timer") startTimer(); else clearInterval(timer);
  document.querySelectorAll('.fruit').forEach(fruit => fruit.remove());
});

/* Game Loop */
setInterval(spawnFruit, fruitRate);
</script>
</body>
</html>
